name: build & publish docker image

on:
  push:
    branches:
      - main

jobs:

  build-and-publish:

    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Get timestamp
        id: timestamp
        run: echo "tag=$(date +'%Y%d%m%H%M%S')" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./src
          file: ./src/dockerfile
          push: true
          tags: |
            ${{ vars.DOCKER_HUB_USERNAME }}/thisisfine:latest
            ${{ vars.DOCKER_HUB_USERNAME }}/thisisfine:${{ steps.timestamp.outputs.tag }}
          labels: |
            org.opencontainers.image.title=This Is Fine
            org.opencontainers.image.description=Sample Docker image for academic and learning purposes
            org.opencontainers.image.url=https://hub.docker.com/r/sergiobarriel/thisisfine
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.timestamp.outputs.tag }}
